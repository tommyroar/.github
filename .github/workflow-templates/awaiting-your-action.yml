name: Awaiting Your Action

# Turns the `human-task` / `blocked` labels into a personal work queue. When either
# label is added to an issue or PR, this assigns it to Tommy and posts a sticky
# "⏳ Waiting on you" comment — so GitHub's own email + mobile-app notifications
# fire. When the last such label is removed, it un-assigns and flips the note to
# "✅ Cleared". One ping per state change; no re-nag, no external services.
#
# GitHub-native by design: no webhook, no secret, works the moment it lands in a
# repo. PRs and issues share the issues API for comments/assignees, so one script
# covers both.
#
# Source of truth: robogeosociety/.github. Synced into owned repos by scripts/sync.sh
# and one-click-selectable from the Actions "New workflow" UI.
#
# Note: uses `pull_request` (not `pull_request_target`) — on the rare fork PR the
# token is read-only and the assign/comment is skipped rather than run untrusted.

on:
  issues:
    types: [labeled, unlabeled]
  pull_request:
    types: [labeled, unlabeled]

# Serialize per item so a rapid add-then-remove can't race into a wrong final state.
concurrency:
  group: awaiting-your-action-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write

jobs:
  notify:
    # Only react to our two queue labels; ignore every other label event.
    if: >-
      github.event.label.name == 'human-task' ||
      github.event.label.name == 'blocked'
    runs-on: ubuntu-latest
    steps:
      - name: Assign / clear + sticky comment
        uses: actions/github-script@v7
        with:
          script: |
            const WAIT = ['human-task', 'blocked'];
            const ASSIGNEE = 'tommyroar';           // Tommy's GitHub handle
            const MARKER = '<!-- awaiting-your-action -->';

            const isPR = !!context.payload.pull_request;
            const item = context.payload.pull_request || context.payload.issue;
            const number = item.number;
            const kind = isPR ? 'PR' : 'issue';
            const { owner, repo } = context.repo;

            // Labels still on the item AFTER this event (payload reflects post-change state).
            const current = (item.labels || []).map(l => l.name);
            const active = WAIT.filter(l => current.includes(l));

            // Find our one sticky comment, if any.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (active.length > 0) {
              try {
                await github.rest.issues.addAssignees({ owner, repo, issue_number: number, assignees: [ASSIGNEE] });
              } catch (e) { core.warning(`addAssignees failed: ${e.message}`); }

              const labels = active.map(l => `\`${l}\``).join(' + ');
              const body = `${MARKER}\n### ⏳ Waiting on @${ASSIGNEE}\n`
                + `This ${kind} needs your action — labeled ${labels}.\n\n`
                + `Remove the label${active.length > 1 ? 's' : ''} once handled and this note clears itself.`;
              if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              else await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
              core.info(`${kind} #${number}: waiting on ${ASSIGNEE} (${labels})`);
            } else {
              try {
                await github.rest.issues.removeAssignees({ owner, repo, issue_number: number, assignees: [ASSIGNEE] });
              } catch (e) { core.warning(`removeAssignees failed: ${e.message}`); }

              // Only leave a "cleared" note if we had posted a waiting one.
              if (existing) {
                const body = `${MARKER}\n### ✅ Cleared\nNo longer waiting on @${ASSIGNEE}.`;
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              }
              core.info(`${kind} #${number}: cleared`);
            }
