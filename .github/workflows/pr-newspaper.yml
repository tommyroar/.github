name: PR newspaper (reusable)

# Reusable, model-free validation of a PR description against the newspaper
# framework (readability + iPad-mini page budget). Callers add a 4-line workflow
# that `uses:` this one. The validator + tier script live here once; fix them
# here and every repo's gate updates. The PR body and changed files come from the
# caller's `pull_request` event context, so this needs no checkout of the caller.

on:
  workflow_call: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the validator + tier script
        uses: actions/checkout@v4
        with:
          repository: tommyroar/.github
          path: _prnews

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate PR body
        env:
          GH_TOKEN: ${{ github.token }}
          NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr view "$NUM" --repo "$REPO" --json files > /tmp/files.json
          gh pr view "$NUM" --repo "$REPO" --json body -q '.body' > /tmp/pr-body.md
          pages="$(python3 _prnews/scripts/tier.py /tmp/files.json)"
          echo "Page budget for this PR: $pages"
          python3 _prnews/scripts/validate_pr.py /tmp/pr-body.md --max-pages "$pages"
