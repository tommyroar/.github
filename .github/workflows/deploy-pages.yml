name: Deploy Pages (reusable)

# Canonical GitHub Pages SPA deploy — gh-pages-BRANCH model (peaceiris).
# Push to main -> production at https://tommyroar.github.io/<slug>/
# Pull request  -> staging at   https://tommyroar.github.io/<slug>/staging/  (single shared slot)
# Callers pass `secrets: inherit` so MAPBOX_ACCESS_TOKEN flows through.

on:
  workflow_call:
    inputs:
      slug:
        description: Pages base-path segment (usually the repo name).
        required: true
        type: string
      build_dir:
        description: Directory containing the SPA (its package.json).
        default: web
        type: string
      build_cmd:
        description: 'Build command; --base/--outDir are appended. e.g. "npm run build --" or "npx vite build".'
        default: "npm run build --"
        type: string
      base:
        description: Base path (default "/<slug>/"). Set "/" for root / custom-domain sites.
        default: ""
        type: string
      node_version:
        default: "20"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install dependencies
        working-directory: ${{ inputs.build_dir }}
        run: npm install

      - name: Build SPA
        working-directory: ${{ inputs.build_dir }}
        env:
          VITE_STANDALONE: 'true'
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          BASE='${{ inputs.base }}'
          [ -z "$BASE" ] && BASE='/${{ inputs.slug }}/'
          [ "${{ github.event_name }}" = "pull_request" ] && BASE="${BASE}staging/"
          echo "Building with base=$BASE"
          ${{ inputs.build_cmd }} --base="$BASE" --outDir ../dist-out/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-out
          publish_branch: gh-pages
          destination_dir: ${{ github.event_name == 'pull_request' && 'staging' || '' }}
          keep_files: true

      - name: Comment staging URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const base = ('${{ inputs.base }}' || '/${{ inputs.slug }}/');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Staging preview deployed:** https://tommyroar.github.io${base}staging/`
            })
